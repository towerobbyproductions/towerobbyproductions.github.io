<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Tower Obby Productions - Leaderboards</title>
    <meta name="description" content="Official leaderboards for Tower Obby Productions Roblox game. Top players by Slaps, Playtime, and Robux Spent.">
    <meta name="keywords" content="Roblox, Tower Obby, leaderboards, slaps, playtime, robux, top players">
    <meta name="author" content="Tower Obby Productions">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://towerobbyproductions.github.io/leaderboards/">
    <meta property="og:title" content="Tower Obby Productions - Leaderboards">
    <meta property="og:description" content="Top players by Slaps, Playtime, and Robux Spent">
    <meta property="og:image" content="https://tr.rbxcdn.com/180DAY-ac99810b043fcc8b90d47a062764b279/768/432/Image/Webp/noFilter">
    
    <!-- Fonts & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <img src="https://tr.rbxcdn.com/180DAY-0319103f58ead123c482d498a9ad2494/768/432/Image/Webp/noFilter" 
                         alt="Tower Obby Logo" 
                         class="w-10 h-10 rounded-lg object-cover">
                    <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">
                        Tower Obby Productions
                    </h1>
                </div>
                
                <div class="flex items-center space-x-2">
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition" aria-label="Toggle theme">
                        🌙
                    </button>
                    <button id="langToggle" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition font-medium">
                        RU
                    </button>
                </div>
            </div>
            
            <div class="owner-line mt-2 text-center">
                <span data-lang-en="Created by" data-lang-ru="Создано">Created by</span>
                <a href="https://towerobbyproductions.github.io/communities/102552180/Tower-Obby-Productions/" target="_blank" rel="noopener">
                    Tower Obby Productions
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Title -->
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">
                <span data-lang-en="Leaderboards" data-lang-ru="Таблицы лидеров">Leaderboards</span>
            </h2>
            <p class="text-gray-600 dark:text-gray-400 text-lg">
                <span data-lang-en="Top 25 players in each category" data-lang-ru="Топ 25 игроков в каждой категории">Top 25 players in each category</span>
            </p>
        </div>

        <!-- Category Tabs -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button class="category-tab active px-6 py-3 rounded-lg font-semibold transition" data-category="slaps">
                <i class="fas fa-hand-pointer mr-2"></i>
                <span data-lang-en="Slaps" data-lang-ru="Шлепки">Slaps</span>
            </button>
            <button class="category-tab px-6 py-3 rounded-lg font-semibold transition" data-category="time">
                <i class="fas fa-clock mr-2"></i>
                <span data-lang-en="Playtime" data-lang-ru="Время игры">Playtime</span>
            </button>
            <button class="category-tab px-6 py-3 rounded-lg font-semibold transition" data-category="robux">
                <i class="fas fa-dollar-sign mr-2"></i>
                <span data-lang-en="Robux Spent" data-lang-ru="Потрачено Robux">Robux Spent</span>
            </button>
        </div>

        <!-- Leaderboards -->
        <div class="space-y-8">
            <!-- Slaps Leaderboard -->
            <div id="slaps-leaderboard" class="leaderboard active">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                    <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                        <h3 class="text-xl font-semibold flex items-center">
                            <i class="fas fa-hand-pointer text-blue-600 mr-2"></i>
                            <span data-lang-en="Slaps Leaderboard" data-lang-ru="Таблица лидеров по шлепкам">Slaps Leaderboard</span>
                        </h3>
                        <span class="refresh-timer text-sm text-gray-500" id="slaps-timer"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 dark:bg-gray-700">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">#</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Player" data-lang-ru="Игрок">Player</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Slaps" data-lang-ru="Шлепки">Slaps</th>
                                </tr>
                            </thead>
                            <tbody id="slaps-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Time Leaderboard -->
            <div id="time-leaderboard" class="leaderboard">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                    <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                        <h3 class="text-xl font-semibold flex items-center">
                            <i class="fas fa-clock text-green-600 mr-2"></i>
                            <span data-lang-en="Playtime Leaderboard" data-lang-ru="Таблица лидеров по времени игры">Playtime Leaderboard</span>
                        </h3>
                        <span class="refresh-timer text-sm text-gray-500" id="time-timer"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 dark:bg-gray-700">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">#</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Player" data-lang-ru="Игрок">Player</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Playtime" data-lang-ru="Время игры">Playtime</th>
                                </tr>
                            </thead>
                            <tbody id="time-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Robux Leaderboard -->
            <div id="robux-leaderboard" class="leaderboard">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                    <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                        <h3 class="text-xl font-semibold flex items-center">
                            <i class="fas fa-dollar-sign text-purple-600 mr-2"></i>
                            <span data-lang-en="Robux Spent Leaderboard" data-lang-ru="Таблица лидеров по тратам Robux">Robux Spent Leaderboard</span>
                        </h3>
                        <span class="refresh-timer text-sm text-gray-500" id="robux-timer"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 dark:bg-gray-700">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">#</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Player" data-lang-ru="Игрок">Player</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-lang-en="Robux" data-lang-ru="Robux">Robux</th>
                                </tr>
                            </thead>
                            <tbody id="robux-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-700">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-600 dark:text-gray-400">
                    &copy; <span id="year"></span> Tower Obby Productions. 
                    <span data-lang-en="All rights reserved." data-lang-ru="Все права защищены.">All rights reserved.</span>
                </p>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <a href="https://www.roblox.com/games/9678437015/" target="_blank" rel="noopener" class="text-gray-600 dark:text-gray-400 hover:text-blue-600 transition">
                        <i class="fab fa-roblox"></i>
                    </a>
                </div>
            </div>
        </footer>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
