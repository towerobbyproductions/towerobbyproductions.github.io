<!DOCTYPE html>

  <title>Tower Obby Productions — Community</title>

  <!-- Prevent theme flash: set theme (dark by default) on html element -->
  <script>
    (function(){
      try {
        const stored = localStorage.getItem('theme'); // 'dark' or 'light'
        const theme = stored || 'dark';
        // ensure exactly one of classes 'dark' or 'light' is present
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        }

        const lang = localStorage.getItem('siteLang') || 'en';
        document.documentElement.lang = lang;
        window.__SITE_LANG = lang;
      } catch(e){}
    })();
  </script>

  <!-- Tailwind (layout only) -->
  <script src="https://cdn.tailwindcss.com"></script>
