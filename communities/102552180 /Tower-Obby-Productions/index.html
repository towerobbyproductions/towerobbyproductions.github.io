<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tower Obby Productions — Community</title>

    <!-- Prevent theme flash: set dark by default unless user stored otherwise -->
    <script>
      (function(){
        try {
          const stored = localStorage.getItem('theme'); // 'dark' or 'light'
          const theme = stored || 'dark'; // default dark
          if (theme === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');

          const lang = localStorage.getItem('siteLang') || 'en';
          document.documentElement.lang = lang;
          window.__SITE_LANG = lang;
        } catch(e) {}
      })();
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <meta name="description" content="Tower Obby Productions — community page" />
</head>
<body class="bg-white dark:bg-roblox-dark text-gray-900 dark:text-white transition-colors duration-200 font-sans">
    <div class="max-w-5xl mx-auto p-6">
        <!-- Header: community card + controls -->
        <header class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-start sm:items-center mb-6">
            <img id="communityAvatar" class="w-20 h-20 rounded-lg object-cover shadow-md" alt="Community avatar"
                 src="https://tr.rbxcdn.com/180DAY-a96d76930a4b8fd8835dfb3715d21838/150/150/Image/Webp/noFilter" />
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-3">
                    <h1 id="communityName" class="text-2xl font-bold truncate">Tower Obby Productions</h1>
                    <span id="membersCount" class="text-sm text-gray-500 dark:text-gray-400 truncate">— Members</span>
                </div>
                <div class="mt-1 text-sm text-gray-600 dark:text-gray-300">
                    <span data-i18n="by">By</span>
                    <a id="ownerLink" href="https://www.roblox.com/users/4828786884/profile" target="_blank" rel="noopener noreferrer" class="text-roblox-blue font-medium ml-1">Kirill_Dev</a>
                </div>
                <div class="mt-3 flex gap-2 items-center">
                    <a id="viewOnRoblox" class="inline-block px-3 py-2 bg-gray-100 dark:bg-roblox-dark-secondary rounded-md shadow-sm hover:opacity-90 text-sm" href="https://www.roblox.com/communities/102552180/Tower-Obby-Productions" target="_blank" rel="noopener noreferrer" data-i18n="view_roblox">View Community in Roblox</a>

                    <!-- Language toggle -->
                    <button id="langToggle" title="Switch language" class="px-3 py-2 bg-gray-100 dark:bg-roblox-dark-secondary rounded-md shadow-sm text-sm">
                        EN
                    </button>

                    <!-- Theme toggle -->
                    <button id="themeToggle" title="Toggle theme" class="px-3 py-2 bg-gray-100 dark:bg-roblox-dark-secondary rounded-md shadow-sm text-sm">
                        🌙
                    </button>
                </div>
            </div>
        </header>

        <!-- About -->
        <section id="aboutSection" class="bg-gray-50 dark:bg-roblox-dark-secondary rounded-lg p-4 mb-6 shadow-sm">
            <h2 class="text-lg font-semibold mb-2" data-i18n="about">About</h2>
            <p id="communityAbout" class="text-gray-700 dark:text-gray-300">Loading about…</p>
        </section>

        <!-- Experiences -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold" data-i18n="experiences">Experiences</h2>
                <div id="experiencesCount" class="text-sm text-gray-500 dark:text-gray-400">—</div>
            </div>

            <div id="experiencesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- карточки будут добавлены скриптом -->
            </div>
        </section>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
